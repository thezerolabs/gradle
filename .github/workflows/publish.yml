name: Publish to GitHub Packages

on:
  push:
    branches:
      - develop
  release:
    types: [published]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 24
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '24'
          cache: 'gradle'

      - name: Gradle Wrapper validation
        uses: gradle/actions/wrapper-validation@v3
        timeout-minutes: 5
        continue-on-error: true

      - name: Publish BOM to GitHub Packages
        env:
          # Preferred custom secrets; fall back to defaults provided by GitHub Actions
          GPR_USER: ${{ secrets.GPR_USER || github.actor }}
          GPR_TOKEN: ${{ secrets.GPR_TOKEN || secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew clean :bom:publish --stacktrace --no-daemon

      - name: Publish Library Plugin to GitHub Packages
        env:
          GPR_USER: ${{ secrets.GPR_USER || github.actor }}
          GPR_TOKEN: ${{ secrets.GPR_TOKEN || secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: ${{ github.workspace }}/library
        run: ${{ github.workspace }}/gradlew clean publish --stacktrace --no-daemon
