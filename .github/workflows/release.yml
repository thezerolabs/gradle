name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (overrides tag)'
        required: false

permissions:
  contents: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java 24
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '24'
          cache: 'gradle'

      - name: Gradle Wrapper validation
        uses: gradle/actions/wrapper-validation@v3
        timeout-minutes: 5
        continue-on-error: true

      - name: Compute release version
        id: ver
        run: |
          VER="${{ github.event.inputs.version }}"
          if [ -z "$VER" ]; then
            VER="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$VER" >> $GITHUB_OUTPUT

      - name: Publish BOM to GitHub Packages
        env:
          GPR_USER: ${{ secrets.GPR_USER || github.actor }}
          GPR_TOKEN: ${{ secrets.GPR_TOKEN || secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew -PreleaseVersion=${{ steps.ver.outputs.version }} clean :bom:publish --stacktrace --no-daemon

      - name: Publish Library Plugin to GitHub Packages
        env:
          GPR_USER: ${{ secrets.GPR_USER || github.actor }}
          GPR_TOKEN: ${{ secrets.GPR_TOKEN || secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew -PreleaseVersion=${{ steps.ver.outputs.version }} clean :library:publish --stacktrace --no-daemon

      - name: Bump version to next -SNAPSHOT and push
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          REL="${{ steps.ver.outputs.version }}"
          IFS='.' read -r MA MI PA <<< "$REL"
          NEXT_PA=$((PA + 1))
          NEXT="$MA.$MI.$NEXT_PA-SNAPSHOT"
          echo "Release=$REL Next=$NEXT"

          # Ensure we are on the default branch
          BRANCH="${DEFAULT_BRANCH:-main}"
          git fetch origin "$BRANCH" --depth=1
          git checkout "$BRANCH"
          git pull --ff-only origin "$BRANCH"

          # Update versions in source (GNU sed, use POSIX classes)
          sed -i -E "s/^(version=).*/\1$NEXT/" gradle.properties || true
          # library is a subproject; version is read from root gradle.properties

          # Commit and push if there are changes
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "chore(release): bump to $NEXT after $REL"
            git push origin HEAD:"$BRANCH"
          else
            echo "No version changes to commit"
          fi
